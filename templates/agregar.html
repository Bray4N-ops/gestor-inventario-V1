{% extends "base.html" %}
{% block title %}Agregar Producto{% endblock %}
{% block content %}
<h2>Agregar nuevo producto</h2>
<form method="post">
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Nombre*</label>
            <input type="text" name="nombre" class="form-control" required placeholder="Ej: Vacuna aftosa">
        </div>
        <div class="col-md-6">
            <label class="form-label">Categoría*</label>
            <select name="categoria" class="form-select" required>
                <option value="">Seleccionar...</option>
                <option value="medicamento">Medicamento</option>
                <option value="alimento">Alimento</option>
                <option value="herramienta">Herramienta</option>
                <option value="maquinaria">Maquinaria</option>
            </select>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Cantidad inicial</label>
            <input type="number" step="0.1" name="cantidad" class="form-control" value="0">
        </div>
        <div class="col-md-4">
            <label class="form-label">Unidad</label>
            <input type="text" name="unidad" class="form-control" placeholder="dosis, kg, unidad...">
        </div>
        <div class="col-md-4">
            <label class="form-label">Stock mínimo</label>
            <input type="number" name="stock_minimo" class="form-control" value="10">
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Número de lote</label>
            <input type="text" name="lote" class="form-control">
        </div>
        <div class="col-md-4">
            <label class="form-label">Fecha de vencimiento</label>
            <input type="date" name="fecha_vencimiento" class="form-control">
        </div>
        <div class="col-md-4">
            <label class="form-label">Ubicación</label>
            <input type="text" name="ubicacion" class="form-control">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Notas</label>
        <textarea name="notas" class="form-control" rows="2"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Guardar producto</button>
    <a href="{{ url_for('inventario_view') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
